name: MLOps CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    env:
      MLFLOW_TRACKING_URI: "file://${{ github.workspace }}/mlruns"
      DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
      DOCKER_HUB_ACCESS_TOKEN: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow==2.19.0 scikit-learn pandas numpy

    - name: Run MLflow Project (Local Training)
      run: |
        # Run MLflow Project without creating standard conda environment in GitHub Actions runner
        mlflow run MLProject --env-manager local --entry-point main -P n_estimators=100 -P max_depth=5

    - name: Set up Docker Buildx
      if: ${{ env.DOCKER_HUB_USERNAME != '' && env.DOCKER_HUB_ACCESS_TOKEN != '' }}
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      if: ${{ env.DOCKER_HUB_USERNAME != '' && env.DOCKER_HUB_ACCESS_TOKEN != '' }}
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

    - name: Build Docker Image using MLflow
      if: ${{ env.DOCKER_HUB_USERNAME != '' && env.DOCKER_HUB_ACCESS_TOKEN != '' }}
      run: |
        # Extract the run ID of the run just finished
        RUN_ID=$(python -c "import mlflow; client = mlflow.tracking.MlflowClient(); runs = client.search_runs(experiment_ids=['0']); print(runs[0].info.run_id if runs else '')")
        echo "LOGGED_RUN_ID=$RUN_ID" >> $GITHUB_ENV
        
        # Build Docker Image from the logged model
        mlflow models build-docker -m "runs:/$RUN_ID/model" -n wincentcp/heart-disease-predictor:latest

    - name: Push Docker Image to Docker Hub
      if: ${{ env.DOCKER_HUB_USERNAME != '' && env.DOCKER_HUB_ACCESS_TOKEN != '' }}
      run: |
        docker push wincentcp/heart-disease-predictor:latest

    - name: Archive Model Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: trained-model-artifacts
        path: mlruns/
